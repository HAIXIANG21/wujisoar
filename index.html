<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息收集表单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft Yahei', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .time-location {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1e3c72;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: #2a5298;
        }
        
        .success-message {
            text-align: center;
            color: #28a745;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户信息反馈表单</h1>
        
        <!-- 时间地点信息显示 -->
        <div class="time-location">
            <strong>当前时间：</strong><span id="current-time">2026-05-26 星期二</span> |
            <strong>当前地点：</strong><span id="current-location">广东省 深圳市</span>
        </div>

        <form id="info-form">
            <!-- 姓名 -->
            <div class="form-group">
                <label for="name">姓名 *</label>
                <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>

            <!-- 邮箱 -->
            <div class="form-group">
                <label for="email">邮箱地址 *</label>
                <input type="email" id="email" placeholder="请输入您的邮箱" required>
            </div>

            <!-- 电话 -->
            <div class="form-group">
                <label for="phone">联系电话</label>
                <input type="text" id="phone" placeholder="请输入联系电话">
            </div>

            <!-- 主题 -->
            <div class="form-group">
                <label for="subject">反馈主题 *</label>
                <select id="subject" required>
                    <option value="">请选择反馈主题</option>
                    <option value="product">产品咨询</option>
                    <option value="service">服务反馈</option>
                    <option value="complaint">投诉建议</option>
                    <option value="other">其他</option>
                </select>
            </div>

            <!-- 内容 -->
            <div class="form-group">
                <label for="message">反馈内容 *</label>
                <textarea id="message" placeholder="请详细描述您的问题或建议" required></textarea>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="submit-btn">提交反馈</button>
        </form>

        <!-- 成功提示 -->
        <div id="success-message" class="success-message">
            提交成功！感谢您的反馈，我们会尽快与您联系。
        </div>
    </div>

    <script>
        // 设置当前时间和地点
        document.addEventListener('DOMContentLoaded', function() {
            const timeSpan = document.getElementById('current-time');
            const locationSpan = document.getElementById('current-location');
            const successMessage = document.getElementById('success-message');
            
            // 设置当前时间
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            };
            timeSpan.textContent = now.toLocaleDateString('zh-CN', options);
            
            // 设置当前地点
            locationSpan.textContent = '广东省 深圳市';
            
            // 表单提交处理
            document.getElementById('info-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 这里可以添加实际的提交逻辑
                console.log('表单提交数据:', {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    subject: document.getElementById('subject').value,
                    message: document.getElementById('message').value,
                    time: now.toLocaleString(),
                    location: '广东省 深圳市'
                });
                
                // 显示成功消息
                successMessage.style.display = 'block';
                
                // 重置表单
                this.reset();
                
                // 3秒后隐藏成功消息
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            });
        });
    </script>
</body>
</html>
